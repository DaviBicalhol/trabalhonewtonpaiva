<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale conosco</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">
            <a href="index.html"></a>
            <img src="logotecnewton.png" alt="logotec">
        </div>
        <ul class="navlink">
            <li><a href="index.html">Início</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="index.html">Carrinho</a></li>
            <li><a href="contato.html" class="btn-FaleConosco">Fale Conosco</a></li>
        </ul>
    </nav>
    <main class="contato-container">
        <h2>Fale Conosco</h2>
        <p>Tem alguma dúvida? Envie uma mensagem para a equipe Tec-Newton!</p>

        <form class="form-contato">
            <div class="campo">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome..." required>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo">
                <label for="assunto">Assunto:</label>
                <select id="assunto" name="assunto">
                    <option value="suporte">Suporte Técnico</option>
                    <option value="vendas">Dúvidas sobre Produtos</option>
                    <option value="elogio">Elogios/Sugestões</option>
                </select>
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como podemos ajudar?" required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
        </form>
    </main>
</body>

</html>
